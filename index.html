<!doctype html>

    <section class="section works-section" aria-labelledby="works-title">
      <div class="container">
        <div class="section-heading">
          <h2 id="works-title">Works</h2><span class="arrow" aria-hidden="true"></span>
        </div>
        <div class="card-row" data-carousel="works">
          <article class="card card--work">
            <div class="thumb" role="img" aria-label="Work thumbnail"></div>
            <h3 class="work-title">Title</h3>
            <a class="pill" href="works.html"><span class="sr-only">See more works</span></a>
          </article>
          <article class="card card--work">

            <h3 class="work-title">Title</h3>
            <a class="pill" href="works.html"><span class="sr-only">See more works</span></a>
          </article>
        </div>
        <nav class="dots dots--works" data-dots="works" aria-label="Works carousel"></nav>

        <div class="section-heading">

             モーダルのteam/roleは data-team="..." data-role="..." をカードのbuttonに追加すると表示される -->
        <div class="card-row" data-carousel="members">
          <button type="button" class="card card--member" data-team="" data-role="Head Cheerleader">

            <p class="member-name">Maki</p>
          </button>
          <button type="button" class="card card--member" data-team="web" data-role="Web Design / Front-end Development">

            <p class="member-name">Ginga</p>
          </button>
          <button type="button" class="card card--member" data-team="advertisement" data-role="Photo Direction">
            <img class="member-photo" src="img/members/maiko.jpg" alt="Maiko">
            <p class="member-name">Maiko</p>
          </button>
          <button type="button" class="card card--member" data-team="game" data-role="Game Programmer">

          </button>
          <button type="button" class="card card--member" data-team="" data-role="">
            <img class="member-photo" src="img/members/nagai.jpg" alt="Nagai">
            <p class="member-name">Nagai</p>
          </button>
          <button type="button" class="card card--member" data-team="web" data-role="design and code Blog section of the website">
            <img class="member-photo" src="img/members/nobuteru.jpg" alt="Nobuteru">
            <p class="member-name">Nobuteru</p>
          </button>
          <button type="button" class="card card--member" data-team="" data-role="">
            <img class="member-photo" src="img/members/shu.jpg" alt="Shu">

          </button>
          <button type="button" class="card card--member" data-team="advertisement" data-role="editor">
            <img class="member-photo" src="img/members/soomin.jpg" alt="Soomin">

            <img class="member-photo" src="img/members/youmi.jpg" alt="Youmi">
            <p class="member-name">Youmi</p>

            <p class="member-name">Aishah</p>

            <p class="member-name">Nanasa</p>
          </button>
          <button type="button" class="card card--member" data-team="opening" data-role="filming, creating comic-style images of the cast, and editing">
            <div class="member-photo" role="img" aria-label="Member photo"></div>
            <p class="member-name">Marin</p>
          </button>
          <button type="button" class="card card--member" data-team="ending" data-role="Direction and creating the details">
            <div class="member-photo" role="img" aria-label="Member photo"></div>

  <footer class="site-footer">

</footer>
  <div class="member-modal" id="member-modal" hidden>
    <div class="member-modal__backdrop" data-modal-close></div>

      <button class="member-modal__close" type="button" data-modal-close aria-label="Close">&#215;</button>
      <img class="member-modal__photo" src="" alt="">
      <p class="member-modal__name" id="member-modal-name">Name</p>

        <div><dt>team</dt><dd data-field="team">XXXXXXXXXX</dd></div>
        <div><dt>role</dt><dd data-field="role">XXXXXXXXXXXXXXXXXXXX</dd></div>
