<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="ENG SA G1 — class portfolio: works, members and blog">
  <title>ENG SA G1 — Home</title>
  <link rel="stylesheet" href="shared.css?v=6">
  <link rel="stylesheet" href="style.css?v=6">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-current="page">ENG SA G1</a>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="works.html">WORK</a>
      <a href="blog.html">BLOG</a>
    </nav>

  <main>
    <section class="hero" aria-label="Hero">
      <h1>Hero</h1>
    </section>

    <section class="section works-section" aria-labelledby="works-title">
      <div class="container">
        <div class="section-heading">
          <h2 id="works-title">Works</h2><span class="arrow" aria-hidden="true"></span>
        </div>
        <div class="card-row" data-carousel="works">
          <article class="card card--work">
            <div class="thumb" role="img" aria-label="Work thumbnail"></div>
            <h3 class="work-title">Title</h3>
            <a class="pill" href="works.html"><span class="sr-only">See more works</span></a>
          </article>

            <a class="pill" href="works.html"><span class="sr-only">See more works</span></a>
          </article>
        </div>
        <nav class="dots dots--works" data-dots="works" aria-label="Works carousel"></nav>
      </div>
    </section>

    <section class="section members-section" aria-labelledby="members-title">
      <div class="container">
        <div class="section-heading">
          <h2 id="members-title">Members</h2><span class="arrow" aria-hidden="true"></span>
        </div>
        <!-- 顔写真を入れるとき: <div class="member-photo"> を
             <img class="member-photo" src="images/members/xxx.jpg" alt="名前"> に差し替え -->
        <div class="card-row" data-carousel="members">
          <article class="card card--member">
            <div class="member-photo" role="img" aria-label="Member photo"></div>
            <p class="member-name">Name</p>
          </article>
          <article class="card card--member">

          </article>
          <article class="card card--member">
            <div class="member-photo" role="img" aria-label="Member photo"></div>
            <p class="member-name">Name</p>
          </article>
        </div>
        <nav class="dots dots--wide" data-dots="members" aria-label="Members carousel"></nav>
      </div>
    </section>

    <section class="section blog-section" aria-labelledby="blog-title">
      <div class="container">
        <div class="section-heading">
          <h2 id="blog-title">Blog</h2><span class="arrow" aria-hidden="true"></span>
        </div>
        <div class="card-row" data-carousel="blog">
          <a class="card" href="blog.html"><span class="sr-only">Blog post 1</span></a>
          <a class="card" href="blog.html"><span class="sr-only">Blog post 2</span></a>

      </div>
    </section>
  </main>

  <footer class="site-footer"></footer>
  <script src="script.js" defer></script>

</html>
